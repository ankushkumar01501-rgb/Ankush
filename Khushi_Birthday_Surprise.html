<!doctype html><html><head><meta charset='utf-8'><meta name='viewport' content='width=device-width,initial-scale=1'>
<title>Happy Birthday Khushi</title>
<style>
body{margin:0;font-family:Verdana;background:linear-gradient(180deg,#ffd9ec,#fff0f7);overflow:hidden;text-align:center;color:#7a2350}
#wrap{padding:30px}
button{padding:14px 26px;border:none;border-radius:30px;background:#ff5fa2;color:#fff;font-size:18px}
#gift,#letter,#final{display:none}
.float{position:fixed;top:-5vh;animation:fall linear infinite;font-size:24px}
@keyframes fall{to{transform:translateY(110vh) rotate(360deg)}}
.card{background:#ffffffd9;margin:20px auto;max-width:700px;padding:20px;border-radius:20px;box-shadow:0 8px 20px #0002}
.type{white-space:pre-wrap;min-height:220px;text-align:left}
</style></head><body><div id=wrap>
<h1>🌸 Happy Birthday, Khushi! 🌸</h1>
<p>A tiny surprise made especially for you.</p>
<button onclick="showGift()">🎁 Open Your Gift</button>
<div id=gift class=card><h2>🎁 Tap the Gift</h2><button onclick="openGift()">💝 Open</button></div>
<div id=letter class=card><h2>💌</h2><div id=t class=type></div><br><button onclick="finish()">✨ One Last Surprise</button></div>
<div id=final class=card><h2>🌙✨</h2><p>May your smile always shine as brightly as the stars.</p><h2>Happy Birthday, Khushi! 🌸</h2><p>Stay happy, stay blessed, and keep shining. ❤️</p><button onclick="window.open('https://www.youtube.com/results?search_query=One+Direction+What+Makes+You+Beautiful')">🎵 Play Our Song</button><p onclick="alert('Hey Angry Bird... thank you for existing. ❤️🌸')" style="cursor:pointer">💖 Tap the heart</p></div>
</div><script>
for(let i=0;i<50;i++){let d=document.createElement('div');d.className='float';d.textContent=Math.random()>.5?'🌸':'💖';d.style.left=Math.random()*100+'vw';d.style.animationDuration=(5+Math.random()*5)+'s';d.style.animationDelay=(-Math.random()*8)+'s';document.body.appendChild(d);}
function showGift(){gift.style.display='block';}
let msg=`Hey Angry Bird, 🐦❤️

Happy Birthday! 🎂🎉

I hope your life is always filled with beautiful moments, endless smiles, good health, and... some 🧠 too! 😜

Enjoy every moment, laugh as much as you can, and make lots of amazing memories today and always.

Heheh... Happy Birthday once again! 🥳🌸

Stay happy, stay blessed, and keep shining. ✨💖`;
function openGift(){gift.style.display='none';letter.style.display='block';let i=0;let x=setInterval(()=>{t.textContent+=msg[i++]||'';if(i>msg.length)clearInterval(x);},28);}
function finish(){letter.style.display='none';final.style.display='block';}
</script></body></html>
